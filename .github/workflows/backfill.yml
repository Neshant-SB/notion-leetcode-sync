name: Backfill Full History → Notion (cookies required)

on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests python-dateutil beautifulsoup4

      - name: Run backfill
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:       ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_STATS_DATABASE_ID: ${{ secrets.NOTION_STATS_DATABASE_ID }}
          LEETCODE_USERNAME:        ${{ secrets.LEETCODE_USERNAME }}
          LEETCODE_SESSION:         ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF:            ${{ secrets.LEETCODE_CSRF }}
        run: python sync.py backfill --create-missing --fill-dates