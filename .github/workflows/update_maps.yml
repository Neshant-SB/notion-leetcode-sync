name: Update Tag Maps (NC + TUF)

on:
  schedule:
    - cron: "30 21 * * *"   # ✅ 3:00 AM IST = 9:30 PM UTC. timezone: key removed (not valid in GHA)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ fixed from v6
        with:
          fetch-depth: 0

      - name: Install uv (and Python)
        uses: astral-sh/setup-uv@v5   # ✅ fixed from v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"      # ✅ 3.14 is pre-release, use stable 3.12

      - name: Install deps
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Update NC map
        run: uv run python scripts/update_nc_map.py

      - name: Update TUF map (scrape → fallback)
        env:
          A2Z_JSON_URL: "https://raw.githubusercontent.com/hitarth-gg/CP/refs/heads/main/striver-a2z.json"
          TUF_MIN_SCRAPE_SLUGS: "100"
        run: uv run python scripts/update_tuf_map.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tag-maps-debug
          path: |
            artifacts/
            maps/tuf.json
            maps/nc_allnc.json

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maps/tuf.json maps/nc_allnc.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update tag maps [skip ci]"
          git push origin HEAD:main