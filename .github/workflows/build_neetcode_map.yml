name: Build NeetCode All Map

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch: {}

jobs:
  build-map:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Allow the workflow to push the updated JSON back to the repo
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Scrape NeetCode All → neetcode_all_map.json
        run: python build_neetcode_map.py

      - name: Commit & push updated map
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neetcode_all_map.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update neetcode_all_map.json [skip ci]"
          git push