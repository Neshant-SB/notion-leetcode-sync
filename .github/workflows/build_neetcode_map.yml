name: Build NeetCode All Map

on:
  schedule:
    # 12:00 AM and 12:00 PM IST (Asia/Kolkata = UTC+5:30)
    - cron: "30 18,6 * * *"
      timezone: "Asia/Kolkata"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-map:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv (and Python)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install Python deps
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Scrape NeetCode All → neetcode_all_map.json
        env:
          NEETCODE_DEBUG: "1"
        run: uv run python build_neetcode_map.py

      - name: Commit & push updated map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com]"

          git add neetcode_all_map.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update neetcode_all_map.json [skip ci]"
          git push origin HEAD:main

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neetcode-debug
          path: |
            neetcode_debug.html
            neetcode_debug.png