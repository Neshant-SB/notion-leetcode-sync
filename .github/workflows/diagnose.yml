name: Diagnose Notion DB property names

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests python-dateutil

      - name: Run diagnose
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:       ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_STATS_DATABASE_ID: ${{ secrets.NOTION_STATS_DATABASE_ID }}
        run: python sync.py diagnose